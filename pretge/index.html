<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #050410;
      color: #f0e6c8;
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 2px; }

    @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.35} }
    @keyframes shimmer  { 0%,100%{opacity:.25} 50%{opacity:.55} }
    @keyframes fadeIn   { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideIn  { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:translateX(0)} }

    /* ── 배경 glow ── */
    #bg-glow {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(255,214,0,.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 90% 90%, rgba(120,80,255,.04) 0%, transparent 50%);

      display: flex; align-items: center; justify-content: space-between;
      background: rgba(5,4,16,.9);
      backdrop-filter: blur(14px);
    }

    #header-left { display: flex; align-items: center; gap: 12px; }

    #logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #ffd600, #ff8c00);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 18px rgba(255,214,0,.32);

    #logo-text { font-family: 'Syne', sans-serif; font-weight: 900; font-size: 18px; }

    #header-right { display: flex; align-items: center; gap: 28px; }

    .stat-lbl  { font-size: 10px; color: rgba(255,255,255,.35); margin-top: 2px; }

    #live-dot-wrap { display: flex; align-items: center; gap: 6px; font-size: 10px; }
    #live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      animation: pulse 2s infinite;
    }

    /* ── 바디 ── */
    #body { max-width: 1400px; margin: 0 auto; padding: 28px 24px; position: relative; z-index: 1; }

    /* ── 필터 바 ── */

      display: flex; gap: 10px; margin-bottom: 22px;
      flex-wrap: wrap; align-items: center;
    }

    #search-input {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px; padding: 9px 14px;

    #search-input::placeholder { color: rgba(255,255,255,.25); }

    .filter-btn {
      background: rgba(255,255,255,.04);

      color: #ffd600; font-weight: 700;
    }
    .filter-btn:hover:not(.active) { border-color: rgba(255,255,255,.2); color: rgba(255,255,255,.75); }

    /* ── 메인 그리드 ── */

      grid-template-columns: 1fr 400px;

    /* ── 카드 그리드 ── */

      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));

      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.08);

      border-color: rgba(255,255,255,.16);

    .market-link {

    .market-link-arrow { margin-left: 5px; font-size: 11px; color: #ffd600; }

    .market-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }

    .market-stat-lbl { font-size: 10px; color: rgba(255,255,255,.35); margin-top: 3px; }

      grid-column: 1 / -1;

<script>
// ═══════════════════════════════════════════════════════════════
//  DATA & CONSTANTS
// ═══════════════════════════════════════════════════════════════

const KNOWN_PROJECTS = {

  solayer:    { ticker: "LAYER",   category: "Restaking",         logo: "🔷" },

const COMPLETED_TGE = new Set([
  "monad","mon","initia","init","zora","pump","pumpfun","pump.fun",
  "berachain","bera","movement","move","hyperliquid","hype",

  "arbitrum","arb","optimism","sei","sui","aptos","celestia","tia",
  "dymension","dym","injective","inj","osmosis","cosmos",
  "jito","jup","jupiter","drift","wormhole","pyth",
  "eigenlayer","eigen","etherfi","ethfi","pendle","babylon",
  "grass","io.net","nillion","altlayer","usual","resolv",

const TGE_KEYWORDS = [
  "tge","token launch","airdrop","token generation",
  "fdv","launch price","token sale","ido","ieo",
];

const MOCK_MARKETS = [
  { id:"poly-1", question:"Will Polymarket ($POLY) launch a token by Dec 2026?",       slug:"polymarket-poly-token-dec-2026", outcomePrices:"[0.71,0.29]", volume:"4800000", volume24hr:"420000",  endDate:"2026-12-31T00:00:00Z" },
  { id:"poly-2", question:"Will Polymarket ($POLY) TGE FDV exceed $5B?",               slug:"polymarket-fdv-5b",              outcomePrices:"[0.62,0.38]", volume:"2700000", volume24hr:"185000",  endDate:"2026-12-31T00:00:00Z" },
  { id:"poly-3", question:"Will Polymarket ($POLY) TGE FDV exceed $10B?",              slug:"polymarket-fdv-10b",             outcomePrices:"[0.41,0.59]", volume:"1900000", volume24hr:"130000",  endDate:"2026-12-31T00:00:00Z" },
  { id:"gen-1",  question:"Gensyn ($AI) public sale commitments above $30M?",          slug:"gensyn-sale-30m",                outcomePrices:"[0.91,0.09]", volume:"3200000", volume24hr:"210000",  endDate:"2026-03-31T00:00:00Z" },
  { id:"gen-2",  question:"Gensyn FDV above $500M one day after TGE?",                 slug:"gensyn-fdv-500m",                outcomePrices:"[0.67,0.33]", volume:"2400000", volume24hr:"155000",  endDate:"2026-12-31T00:00:00Z" },
  { id:"gen-3",  question:"Gensyn FDV above $1.5B one day after TGE?",                 slug:"gensyn-fdv-1b5",                 outcomePrices:"[0.22,0.78]", volume:"1900000", volume24hr:"98000",   endDate:"2026-12-31T00:00:00Z" },
  { id:"base-1", question:"Will Base launch a token by June 30, 2026?",                slug:"base-token-june-2026",           outcomePrices:"[0.14,0.86]", volume:"5300000", volume24hr:"380000",  endDate:"2026-06-30T00:00:00Z" },
  { id:"base-2", question:"Will Base launch a token by December 31, 2026?",            slug:"base-token-dec-2026",            outcomePrices:"[0.45,0.55]", volume:"3100000", volume24hr:"220000",  endDate:"2026-12-31T00:00:00Z" },
  { id:"mask-1", question:"Will MetaMask launch a token by December 31, 2026?",        slug:"metamask-token-dec-2026",        outcomePrices:"[0.38,0.62]", volume:"4200000", volume24hr:"310000",  endDate:"2026-12-31T00:00:00Z" },
  { id:"mask-2", question:"Will MetaMask launch a token by June 30, 2026?",            slug:"metamask-token-june-2026",       outcomePrices:"[0.12,0.88]", volume:"1800000", volume24hr:"120000",  endDate:"2026-06-30T00:00:00Z" },
  { id:"kaito-1",question:"Will Kaito ($KAITO) TGE happen in Q1 2026?",               slug:"kaito-tge-q1-2026",              outcomePrices:"[0.76,0.24]", volume:"2800000", volume24hr:"260000",  endDate:"2026-03-31T00:00:00Z" },
  { id:"kaito-2",question:"Will Kaito ($KAITO) TGE FDV exceed $500M?",                slug:"kaito-fdv-500m",                 outcomePrices:"[0.58,0.42]", volume:"1600000", volume24hr:"140000",  endDate:"2026-03-31T00:00:00Z" },
  { id:"bp-1",   question:"Will Backpack ($BP) TGE happen before April 2026?",         slug:"backpack-tge-april-2026",        outcomePrices:"[0.88,0.12]", volume:"3600000", volume24hr:"340000",  endDate:"2026-04-01T00:00:00Z" },
  { id:"bp-2",   question:"Will Backpack ($BP) launch FDV exceed $1B?",                slug:"backpack-fdv-1b",                outcomePrices:"[0.49,0.51]", volume:"2100000", volume24hr:"175000",  endDate:"2026-04-01T00:00:00Z" },
  { id:"story-1",question:"Will Story Protocol ($IP) airdrop before May 2026?",        slug:"story-protocol-airdrop-may-2026",outcomePrices:"[0.82,0.18]", volume:"1500000", volume24hr:"145000",  endDate:"2026-05-01T00:00:00Z" },
  { id:"aztec-1",question:"Will Aztec Network launch a token by end of 2026?",         slug:"aztec-token-2026",               outcomePrices:"[0.55,0.45]", volume:"980000",  volume24hr:"72000",   endDate:"2026-12-31T00:00:00Z" },
  { id:"ecl-1",  question:"Will Eclipse launch a token by June 2026?",                 slug:"eclipse-token-june-2026",        outcomePrices:"[0.33,0.67]", volume:"760000",  volume24hr:"58000",   endDate:"2026-06-30T00:00:00Z" },
];

// ═══════════════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════════════

function parseYesPrice(str) {
  try { return parseFloat(JSON.parse(str)[0]); }
  catch { return 0.5; }
}

function isAlreadyLaunched(text) {
  const l = text.toLowerCase();
  return [...COMPLETED_TGE].some(n => l.includes(n));
}

function getProjectInfo(title) {
  const l = title.toLowerCase();
  for (const [key, info] of Object.entries(KNOWN_PROJECTS)) {
    if (l.includes(key)) return { name: key[0].toUpperCase() + key.slice(1), ...info };
  }
  const first = title.replace(/[^a-zA-Z\s]/g,"").trim().split(/\s+/)[0] || "Unknown";
  return { name: first, ticker: first.toUpperCase().slice(0,4), category: "Crypto", logo: "🪙" };
}

function groupByProject(markets) {
  const map = {};
  for (const m of markets) {
    const info = getProjectInfo(m.question || "");
    const key  = info.name.toLowerCase();
    if (!map[key]) map[key] = { project: info, markets: [] };
    map[key].markets.push(m);
  }
  return Object.values(map).sort((a, b) => {
    const va = a.markets.reduce((s,m) => s + parseFloat(m.volume24hr||0), 0);
    const vb = b.markets.reduce((s,m) => s + parseFloat(m.volume24hr||0), 0);
    return vb - va;
  });
}

function extractFDV(markets) {
  const fdvMs = markets.filter(m => {
    const t = (m.question||"").toLowerCase();
    return t.includes("fdv") || t.includes("market cap") || t.includes("valuation");
  });
  if (!fdvMs.length) return null;

  const points = fdvMs.map(m => {
    const match = (m.question||"").match(/\$([\d.]+)\s*([BbMm])/);
    if (!match) return null;
    const num   = parseFloat(match[1]);
    const unit  = match[2].toUpperCase();
    const value = unit === "B" ? num * 1000 : num;
    return { value, prob: parseYesPrice(m.outcomePrices) };
  }).filter(Boolean);

  if (!points.length) return null;
  points.sort((a,b) => a.value - b.value);

  const low  = points[0];
  const high = points[points.length - 1];
  const mid  = points.find(p => p.prob >= 0.4 && p.prob <= 0.65);
  const est  = mid ? mid.value : (low.prob > 0.5 ? low.value * 1.5 : low.value * 0.8);

  return { low: low.value, high: high.value, estimated: Math.round(est) };
}

function getFDVProb(markets) {
  const fdvMs = markets.filter(m => {
    const t = (m.question||"").toLowerCase();
    return t.includes("fdv") || t.includes("market cap") || t.includes("valuation");
  });
  if (!fdvMs.length) return null;
  return fdvMs.reduce((prev, cur) => {
    const pp = Math.abs(parseYesPrice(prev.outcomePrices) - 0.5);
    const cp = Math.abs(parseYesPrice(cur.outcomePrices) - 0.5);
    return cp < pp ? cur : prev;
  });
}

function formatFDV(val) {
  if (!val) return null;
  return val >= 1000 ? `$${(val/1000).toFixed(1)}B` : `$${val}M`;
}

function probColor(p) {
  if (p === null) return "rgba(255,255,255,.3)";
  if (p >= 60)   return "#4ade80";
  if (p >= 40)   return "#fbbf24";
  return "#f87171";
}

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════

let allGroups    = [];
let activeFilter = "all";
let searchQuery  = "";
let selectedName = null;
let isLoading    = false;

// ═══════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════

function renderSkeletons() {
  const grid = document.getElementById("card-grid");
  grid.innerHTML = Array.from({length: 8}).map(() =>
    `<div class="skeleton"></div>`
  ).join("");
}

function applyFilter(groups) {
  return groups.filter(({ project, markets }) => {
    const q = searchQuery.toLowerCase();
    if (q && !project.name.toLowerCase().includes(q) && !project.ticker.toLowerCase().includes(q)) return false;
    if (activeFilter === "hot") {
      const v = markets.reduce((s,m) => s + parseFloat(m.volume24hr||0), 0);
      return v >= 200000;
    }
    if (activeFilter === "soon") {
      return markets.some(m => {
        if (!m.endDate) return false;
        const d = Math.ceil((new Date(m.endDate) - Date.now()) / 86400000);
        return d > 0 && d <= 45;
      });
    }
    if (activeFilter === "likely") return parseYesPrice(markets[0].outcomePrices) >= 0.65;
    return true;
  });
}

function renderCards() {
  const grid    = document.getElementById("card-grid");
  const empty   = document.getElementById("empty-state");
  const filtered = applyFilter(allGroups);

  if (!filtered.length) {
    grid.innerHTML = `<div id="empty-state" style="display:block;grid-column:1/-1;text-align:center;padding:60px;color:rgba(255,255,255,.3);font-size:14px;">조건에 맞는 프로젝트가 없습니다.</div>`;
    return;
  }

  grid.innerHTML = filtered.map(({ project, markets }) => {
    const fdv     = extractFDV(markets);
    const probM   = getFDVProb(markets);
    const fdvProb = probM ? Math.round(parseYesPrice(probM.outcomePrices) * 100) : null;
    const color   = probColor(fdvProb);
    const isSelected = selectedName === project.name;

    const fdvBlock = fdv
      ? `<div class="fdv-value">${formatFDV(fdv.estimated)}</div>
         <div class="fdv-range">${formatFDV(fdv.low)} – ${formatFDV(fdv.high)}</div>`
      : `<div class="fdv-empty">—</div><div class="fdv-empty-sub">데이터 없음</div>`;

    const barBlock = fdvProb !== null
      ? `<div class="prob-bar-wrap"><div class="prob-bar" style="width:${fdvProb}%;background:${color}"></div></div>`
      : "";

    return `
      <div class="card${isSelected ? " selected" : ""}" data-name="${project.name}" onclick="selectProject('${project.name}')">
        <div class="card-header">
          <div class="card-logo">${project.logo}</div>
          <div class="card-meta">
            <div><span class="card-name">${project.name}</span><span class="card-ticker">$${project.ticker}</span></div>
            <div class="card-category">${project.category}</div>
          </div>
        </div>
        <div class="card-body">
          <div class="card-body-inner">
            <div>
              <div class="fdv-label">예상 FDV</div>
              ${fdvBlock}
            </div>
            <div class="prob-col">
              <div class="prob-label">확률</div>
              <div class="prob-value" style="color:${color}">${fdvProb !== null ? fdvProb + "%" : "—"}</div>
            </div>
          </div>
          ${barBlock}
        </div>
        <div class="card-footer">
          <span class="market-badge">마켓 ${markets.length}개 ›</span>
        </div>
      </div>`;
  }).join("");
}

function renderDetail(name) {
  const g = allGroups.find(g => g.project.name === name);
  if (!g) return;
  const { project, markets } = g;

  document.getElementById("detail-logo").textContent = project.logo;
  document.getElementById("detail-name").textContent = project.name;
  document.getElementById("detail-tags").innerHTML =
    `<span class="detail-tag-ticker">$${project.ticker}</span>
     <span class="detail-tag-cat">${project.category}</span>`;

  document.getElementById("detail-markets").innerHTML = markets.map(m => {
    const yesP    = Math.round(parseYesPrice(m.outcomePrices) * 100);
    const noP     = 100 - yesP;
    const endDate = m.endDate ? new Date(m.endDate).toLocaleDateString("ko-KR", {month:"short", day:"numeric"}) : "N/A";
    const vol     = (parseFloat(m.volume||0) / 1000).toFixed(1);
    return `
      <div class="market-item">
        <a class="market-link" href="https://polymarket.com/event/${m.slug||""}" target="_blank" rel="noopener">
          ${m.question}<span class="market-link-arrow">↗</span>
        </a>
        <div class="market-stats">
          <div class="market-stat"><div class="market-stat-val" style="color:#4ade80">${yesP}%</div><div class="market-stat-lbl">YES</div></div>
          <div class="market-stat"><div class="market-stat-val" style="color:#f87171">${noP}%</div><div class="market-stat-lbl">NO</div></div>
          <div class="market-stat"><div class="market-stat-val" style="color:#f0e6c8">$${vol}K</div><div class="market-stat-lbl">VOLUME</div></div>
          <div class="market-stat"><div class="market-stat-val" style="color:#f0e6c8">${endDate}</div><div class="market-stat-lbl">마감</div></div>
        </div>
        <div class="market-bar-wrap">
          <div class="market-bar-yes" style="width:${yesP}%"></div>
          <div class="market-bar-no"></div>
        </div>
      </div>`;
  }).join("");
}

function updateHeader() {
  const totalVol = allGroups.reduce((s, {markets}) =>
    s + markets.reduce((ms,m) => ms + parseFloat(m.volume24hr||0), 0), 0);
  document.getElementById("stat-vol").textContent      = `$${(totalVol/1000000).toFixed(1)}M`;
  document.getElementById("stat-projects").textContent = allGroups.length;
}

function setLiveStatus(isMock) {
  const dot   = document.getElementById("live-dot");
  const label = document.getElementById("live-label");
  dot.style.background  = isMock ? "#fbbf24" : "#4ade80";
  dot.style.boxShadow   = `0 0 6px ${isMock ? "#fbbf24" : "#4ade80"}`;
  label.style.color     = isMock ? "#fbbf24" : "#4ade80";
  label.textContent     = isMock ? "DEMO" : "LIVE";
  document.getElementById("demo-banner").classList.toggle("visible", isMock);
}

// ═══════════════════════════════════════════════════════════════
//  INTERACTIONS
// ═══════════════════════════════════════════════════════════════

function selectProject(name) {
  const panel = document.getElementById("detail-panel");
  const grid  = document.getElementById("main-grid");

  if (selectedName === name) {
    // 닫기
    selectedName = null;
    panel.classList.remove("visible");
    grid.classList.remove("panel-open");
  } else {
    selectedName = name;
    renderDetail(name);
    panel.classList.add("visible");
    grid.classList.add("panel-open");
  }
  renderCards();
}

document.getElementById("close-btn").addEventListener("click", () => {
  selectedName = null;
  document.getElementById("detail-panel").classList.remove("visible");
  document.getElementById("main-grid").classList.remove("panel-open");
  renderCards();
});

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    activeFilter = btn.dataset.filter;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderCards();
  });
});

document.getElementById("search-input").addEventListener("input", e => {
  searchQuery = e.target.value;
  renderCards();
});

document.getElementById("refresh-btn").addEventListener("click", loadData);

// ═══════════════════════════════════════════════════════════════
//  DATA LOADING
// ═══════════════════════════════════════════════════════════════

async function loadData() {
  if (isLoading) return;
  isLoading = true;

  const btn = document.getElementById("refresh-btn");
  btn.disabled   = true;
  btn.textContent = "↻ 로딩중...";

  if (!allGroups.length) renderSkeletons();

  try {
    const proxy  = "/api/markets?url=";
    const target = encodeURIComponent(
      "https://gamma-api.polymarket.com/markets?active=true&closed=false&limit=100&order=volume24hr&ascending=false"
    );
    const res  = await fetch(`${proxy}${target}`, { signal: AbortSignal.timeout(8000) });
    if (!res.ok) throw new Error("API 오류");
    const data = await res.json();
    const all  = Array.isArray(data) ? data : (data.markets || []);

    const filtered = all.filter(m => {
      const text = (m.question || m.title || "").toLowerCase();
      return TGE_KEYWORDS.some(kw => text.includes(kw)) && !isAlreadyLaunched(text);
    });

    if (filtered.length < 3) throw new Error("데이터 부족");

    allGroups = groupByProject(filtered);
    setLiveStatus(false);

  } catch (_) {
    allGroups = groupByProject(MOCK_MARKETS);
    setLiveStatus(true);
  }

  updateHeader();
  renderCards();

  // 선택된 패널 유지
  if (selectedName) {
    const still = allGroups.find(g => g.project.name === selectedName);
    if (still) renderDetail(selectedName);
  }

  document.getElementById("updated-at").textContent =
    "업데이트: " + new Date().toLocaleTimeString("ko-KR");

  isLoading = false;
  btn.disabled    = false;
  btn.textContent = "↻ 새로고침";
}

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════

loadData();
setInterval(loadData, 60000);
</script>
